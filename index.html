    :root {

      --text: #0f172a;

      --muted2: #94a3b8;
      --card: #ffffff;
      --card-dark: #0f172a;
      --line: #e2e8f0;
      --emerald: #059669;
      --emerald-2: #10b981;
      --emerald-3: #d1fae5;
      --yellow: #facc15;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-300: #cbd5e1;
      --slate-500: #64748b;
      --slate-700: #334155;
      --slate-800: #1e293b;

      --radius-xl: 24px;
      --radius-2xl: 32px;
      --radius-3xl: 40px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif; }
    body { padding: 16px 16px 120px; }
    .app { max-width: 760px; margin: 0 auto; }
    .row { display: flex; align-items: center; }
    .between { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .header { margin-bottom: 24px; }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-badge {
      width: 52px; height: 52px; border-radius: 18px; background: var(--emerald);
      color: white; display: grid; place-items: center; box-shadow: var(--shadow-lg); font-size: 26px;
    }
    .title { font-size: 32px; font-weight: 900; letter-spacing: -0.04em; font-style: italic; margin: 0; }
    .title span { color: var(--emerald); }
    .fav-btn, .day-btn, .action-btn, .mini-btn, .ghost-btn {
      border: 1px solid transparent; background: white; cursor: pointer; transition: .2s ease;
    }
    .fav-btn {
      display: inline-flex; align-items: center; gap: 8px; padding: 12px 16px; border-radius: 999px;
      font-weight: 800; box-shadow: var(--shadow); color: var(--muted);
    }
    .fav-btn.active { background: var(--yellow); color: white; border-color: #fde68a; }
    .days { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 24px; scrollbar-width: none; }
    .days::-webkit-scrollbar { display: none; }
    .day-btn {
      flex: 0 0 auto; padding: 12px 18px; border-radius: 18px; font-size: 14px; font-weight: 900;
      color: var(--slate-500); border-color: #e5e7eb; box-shadow: var(--shadow);
    }
    .day-btn.active { background: var(--slate-800); color: white; }
    .info-box {
      background: var(--card); border: 1px solid #f1f5f9; border-radius: 28px; padding: 20px; margin-bottom: 24px; box-shadow: var(--shadow);
    }
    .label { font-size: 10px; font-weight: 900; letter-spacing: .25em; color: var(--emerald); text-transform: uppercase; margin-bottom: 6px; }
    .subtitle { margin: 0; font-size: 22px; font-weight: 900; }
    .count { color: var(--muted2); font-weight: 900; font-variant-numeric: tabular-nums; }
    .progress-wrap { width: 100%; height: 10px; background: var(--slate-100); border-radius: 999px; overflow: hidden; margin-top: 12px; }
    .progress-bar { height: 100%; background: var(--emerald-2); width: 0%; transition: width .5s ease; }

    .card-wrap { position: relative; width: 100%; height: 580px; perspective: 1000px; }
    .card-3d { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform .7s ease; cursor: pointer; }
    .card-3d.flipped { transform: rotateY(180deg); }
    .card-face {
      position: absolute; inset: 0; backface-visibility: hidden; border-radius: 40px; overflow: hidden;
      box-shadow: var(--shadow-lg); border: 1px solid #f1f5f9;
    }
    .card-front {
      background: white; display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 36px 28px;
    }
    .front-tag {
      position: absolute; top: 28px; left: 28px; background: #ecfdf5; color: var(--emerald);
      border-radius: 999px; padding: 8px 12px; font-size: 11px; font-weight: 900;
    }
    .focus { font-size: 12px; font-weight: 900; letter-spacing: .4em; color: var(--slate-300); text-transform: uppercase; margin-bottom: 28px; }
    .en-main { font-size: 38px; font-weight: 900; line-height: 1.22; letter-spacing: -0.03em; margin: 0 0 28px; }
    .en-main em, .back-title em { color: var(--emerald); font-style: normal; }
    .divider { width: 40px; height: 4px; border-radius: 999px; background: var(--emerald-3); margin-bottom: 28px; }
    .ko-main { color: var(--emerald); font-size: 24px; font-weight: 800; line-height: 1.45; }
    .tap-hint { margin-top: 56px; color: var(--slate-300); font-size: 11px; letter-spacing: .18em; font-weight: 900; text-transform: uppercase; }

    .card-back {
      background: var(--card-dark); color: white; padding: 24px; transform: rotateY(180deg);
      overflow-y: auto;
    }
    .card-back::-webkit-scrollbar { width: 6px; }
    .card-back::-webkit-scrollbar-thumb { background: #334155; border-radius: 999px; }
    .back-title { margin: 0 0 6px; font-size: 26px; color: #34d399; line-height: 1.3; font-weight: 900; }
    .back-ko { color: #64748b; font-size: 12px; font-weight: 800; text-transform: uppercase; }
    .mark-btn {
      width: 52px; height: 52px; border-radius: 18px; border: none; cursor: pointer;
      background: #1f2937; color: #64748b; display: grid; place-items: center;
      box-shadow: var(--shadow);
    }
    .mark-btn.active { background: var(--yellow); color: white; }
    .examples-title { color: #64748b; font-size: 10px; font-weight: 900; letter-spacing: .22em; text-transform: uppercase; margin: 4px 0 12px; }
    .example { background: rgba(51,65,85,.6); border: 1px solid rgba(71,85,105,.35); border-radius: 28px; padding: 20px; margin-bottom: 14px; }
    .example-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 10px; }
    .example-label { font-size: 10px; font-weight: 900; letter-spacing: .16em; text-transform: uppercase; color: #10b981; }
    .mini-btn {
      padding: 8px 12px; border-radius: 10px; font-size: 11px; font-weight: 900;
      background: var(--emerald); color: white; border: none;
    }
    .mini-btn.muted { background: #334155; color: #cbd5e1; }
    .ko-example { margin: 0; color: #f8fafc; font-weight: 800; line-height: 1.5; }
    .en-answer {
      margin-top: 12px; padding: 14px; background: rgba(16,185,129,.12); border: 1px solid rgba(16,185,129,.22);
      border-radius: 18px; color: #34d399; font-weight: 900; line-height: 1.6;
    }
    .empty {
      width: 100%; height: 580px; background: white; border-radius: 40px; border: 2px dashed var(--slate-200);
      display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 28px;
    }
    .empty-star { font-size: 64px; color: var(--slate-200); margin-bottom: 18px; }
    .empty h3 { margin: 0 0 8px; font-size: 28px; }
    .empty p { margin: 0 0 24px; color: var(--muted2); line-height: 1.7; }
    .ghost-btn { padding: 18px 26px; border-radius: 24px; background: var(--slate-800); color: white; font-weight: 900; box-shadow: var(--shadow-lg); border: none; }

    .bottom-nav {
      position: fixed; left: 0; right: 0; bottom: 20px; padding: 0 16px; z-index: 40;
    }
    .bottom-inner { max-width: 520px; margin: 0 auto; display: flex; gap: 14px; }
    .action-btn {
      border: none; border-radius: 28px; padding: 18px 20px; font-weight: 900; box-shadow: var(--shadow-lg);
      display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 18px;
    }
    .action-btn.prev { flex: 1; background: white; color: var(--slate-800); }
    .action-btn.next { flex: 2; background: var(--emerald); color: white; }
    .action-btn:disabled { background: var(--slate-200); color: var(--muted2); cursor: not-allowed; box-shadow: none; }

    .icon { font-style: normal; }

    @media (max-width: 640px) {
      body { padding: 14px 14px 120px; }
      .title { font-size: 26px; }
      .card-wrap, .empty { height: 540px; }
      .en-main { font-size: 31px; }
      .ko-main { font-size: 20px; }
      .subtitle { font-size: 18px; }
      .fav-btn { padding: 10px 12px; }
    }
  </style>
</head>

    const state = {
      day: 1,
      index: 0,
      flipped: false,
      marks: new Set(),
      revealed: new Set()
    };

    const $dayNav = document.getElementById('dayNav');
    const $mainArea = document.getElementById('mainArea');
    const $infoTitle = document.getElementById('infoTitle');
    const $countText = document.getElementById('countText');
    const $progressBar = document.getElementById('progressBar');
    const $favBtn = document.getElementById('favBtn');
    const $favCount = document.getElementById('favCount');
    const $prevBtn = document.getElementById('prevBtn');
    const $nextBtn = document.getElementById('nextBtn');

    function getCurrentList() {
      if (state.day === 'fav') return DATA.filter(v => state.marks.has(v.id));
      return DATA.filter(v => v.day === state.day);
    }

    function getCard() {
      const list = getCurrentList();
      return list[state.index] || DATA[0];
    }

    function setDay(day) {
      state.day = day;
      state.index = 0;
      state.flipped = false;
      state.revealed = new Set();
      render();
    }

    function move(dir) {
      const list = getCurrentList();
      const next = state.index + dir;
      if (next >= 0 && next < list.length) {
        state.index = next;
        state.flipped = false;
        state.revealed = new Set();
        render();
      }
    }

    function toggleMark(id) {
      if (state.marks.has(id)) state.marks.delete(id);
      else state.marks.add(id);
      if (state.day === 'fav') {
        const list = getCurrentList();
        if (state.index > Math.max(0, list.length - 1)) state.index = Math.max(0, list.length - 1);
      }
      render();
    }

    function toggleReveal(i) {
      if (state.revealed.has(i)) state.revealed.delete(i);
      else state.revealed.add(i);
      renderCardOnly();
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderDayNav() {
      $dayNav.innerHTML = '';
      DAY_TITLES.forEach((_, i) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'day-btn' + (state.day === i + 1 ? ' active' : '');
        btn.textContent = `D-${i + 1}`;
        btn.addEventListener('click', () => setDay(i + 1));
        $dayNav.appendChild(btn);
      });
    }

    function renderCardOnly() {
      const list = getCurrentList();
      const card = getCard();
      if (!list.length) {
        $mainArea.innerHTML = `
          <div class="empty">
            <div class="empty-star">⭐</div>
            <h3>북마크된 문장이 없습니다</h3>
            <p>학습 중에 다시 보고 싶은 문장은<br>별표를 눌러 나만의 리스트를 만드세요.</p>
            <button class="ghost-btn" type="button" id="goDay1">Day 1로 가기</button>
          </div>
        `;
        document.getElementById('goDay1').addEventListener('click', () => setDay(1));
        return;
      }

      const examplesHtml = card.ex.map((item, i) => `
        <div class="example">
          <div class="example-head">
            <span class="example-label">Example ${i + 1}</span>
            <button type="button" class="mini-btn ${state.revealed.has(i) ? 'muted' : ''}" data-reveal="${i}">
              ${state.revealed.has(i) ? '숨기기' : '정답 확인'}
            </button>
          </div>
          <p class="ko-example">${escapeHtml(item.ko)}</p>
          ${state.revealed.has(i) ? `<div class="en-answer">→ ${escapeHtml(item.en)}</div>` : ''}
        </div>
      `).join('');

      $mainArea.innerHTML = `
        <div class="card-wrap">
          <div id="flipCard" class="card-3d ${state.flipped ? 'flipped' : ''}">
            <div class="card-face card-front">
              <div class="front-tag">PATTERN #${String(card.id).padStart(2, '0')}</div>
              <div class="focus">Sentence Focus</div>
              <h3 class="en-main">${card.en}</h3>
              <div class="divider"></div>
              <div class="ko-main">${escapeHtml(card.ko)}</div>
              <div class="tap-hint">↻ Tap To Check Examples</div>
            </div>
            <div class="card-face card-back">
              <div class="between" style="align-items:flex-start; margin-bottom:18px; gap:14px;">
                <div>
                  <h3 class="back-title">${card.en}</h3>
                  <div class="back-ko">${escapeHtml(card.ko)}</div>
                </div>
                <button type="button" id="markBtn" class="mark-btn ${state.marks.has(card.id) ? 'active' : ''}">${state.marks.has(card.id) ? '⭐' : '☆'}</button>
              </div>
              <div class="examples-title">실전 예문 연습 (3개)</div>
              ${examplesHtml}
            </div>
          </div>
        </div>
      `;

      const flipCard = document.getElementById('flipCard');
      flipCard.addEventListener('click', () => {
        state.flipped = !state.flipped;
        renderCardOnly();
      });

      const markBtn = document.getElementById('markBtn');
      if (markBtn) {
        markBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleMark(card.id);
        });
      }

      Array.from(document.querySelectorAll('[data-reveal]')).forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleReveal(Number(btn.dataset.reveal));
        });
      });
    }

    function render() {
      const list = getCurrentList();
      if (state.index > Math.max(0, list.length - 1)) state.index = Math.max(0, list.length - 1);
      const progress = list.length ? ((state.index + 1) / list.length) * 100 : 0;

      renderDayNav();
      renderCardOnly();

      $infoTitle.textContent = state.day === 'fav' ? '오답/중요 노트' : `DAY ${state.day}: ${DAY_TITLES[state.day - 1]}`;
      $countText.textContent = `${list.length ? state.index + 1 : 0} / ${list.length}`;
      $progressBar.style.width = `${progress}%`;
      $favCount.textContent = state.marks.size;
      $favBtn.className = 'fav-btn' + (state.day === 'fav' ? ' active' : '');
      $prevBtn.disabled = state.index === 0 || list.length === 0;
      $nextBtn.disabled = state.index === list.length - 1 || list.length === 0;
    }

    $favBtn.addEventListener('click', () => setDay('fav'));
    $prevBtn.addEventListener('click', () => move(-1));
    $nextBtn.addEventListener('click', () => move(1));

    render();
  </script>
</body>
</html>
