                // --- PCM to WAV Utility ---
                function pcmToWav(pcmData, sampleRate) {
                    const buffer = new ArrayBuffer(44 + pcmData.length * 2);
                    const view = new DataView(buffer);
                    const writeStr = (off, s) => {
                        for (let i = 0; i < s.length; i++)
                            view.setUint8(off + i, s.charCodeAt(i));
                    };
                    writeStr(0, "RIFF");
                    view.setUint32(4, 32 + pcmData.length * 2, true);
                    writeStr(8, "WAVE");
                    writeStr(12, "fmt ");
                    view.setUint32(16, 16, true);
                    view.setUint16(20, 1, true);
                    view.setUint16(22, 1, true);
                    view.setUint32(24, sampleRate, true);
                    view.setUint32(28, sampleRate * 2, true);
                    view.setUint16(32, 2, true);
                    view.setUint16(34, 16, true);
                    writeStr(36, "data");
                    view.setUint32(40, pcmData.length * 2, true);
                    for (let i = 0; i < pcmData.length; i++)
                        view.setInt16(44 + i * 2, pcmData[i], true);
                    return buffer;
                }

                function App() {
                    const [day, setDay] = useState(1);
                    const [index, setIndex] = useState(0);
                    const [flipped, setFlipped] = useState(false);
                    const [marks, setMarks] = useState(new Set());
                    const [revealed, setRevealed] = useState(new Set());
                    const [isAiLoading, setIsAiLoading] = useState(false);
                    const [aiResult, setAiResult] = useState(null);
                    const [isSpeaking, setIsSpeaking] = useState(false);

                    const currentList = useMemo(() => {
                        if (day === "fav")
                            return DATA.filter((v) => marks.has(v.id));
                        return DATA.filter((v) => v.day === day);
                    }, [day, marks]);

                    const card = currentList[index] || DATA[0];
                    const progress =
                        currentList.length > 0
                            ? ((index + 1) / currentList.length) * 100
                            : 0;

                    // --- Handlers (Declared as functions to ensure scope safety) ---
                    function move(dir) {
                        if (
                            index + dir >= 0 &&
                            index + dir < currentList.length
                        ) {
                            setFlipped(false);
                            setRevealed(new Set());
                            setAiResult(null);
                            setIndex(index + dir);
                        }
                    }

                    function toggleMark(e) {
                        if (e) e.stopPropagation();
                        const next = new Set(marks);
                        if (next.has(card.id)) next.delete(card.id);
                        else next.add(card.id);
                        setMarks(next);
                    }

                    function toggleReveal(idx, e) {
                        if (e) e.stopPropagation();
                        const next = new Set(revealed);
                        if (next.has(idx)) next.delete(idx);
                        else next.add(idx);
                        setRevealed(next);
                    }

                    async function callGemini(prompt, isJson = false) {
                        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                        let retries = 0;
                        while (retries < 5) {
                            try {
                                const res = await fetch(url, {
                                    method: "POST",
                                    headers: {
                                        "Content-Type": "application/json",
                                    },
                                    body: JSON.stringify({
                                        contents: [
                                            { parts: [{ text: prompt }] },
                                        ],
                                        generationConfig: isJson
                                            ? {
                                                  responseMimeType:
                                                      "application/json",
                                              }
                                            : {},
                                    }),
                                });
                                const data = await res.json();
                                return data.candidates?.[0]?.content?.parts?.[0]
                                    ?.text;
                            } catch (e) {
                                retries++;
                                await new Promise((r) =>
                                    setTimeout(r, Math.pow(2, retries) * 1000),
                                );
                            }
                        }
                        throw new Error("API Connection Failed");
                    }

                    async function handleParaphrase(e) {
                        if (e) e.stopPropagation();
                        setIsAiLoading(true);
                        setAiResult(null);
                        try {
                            const cleanPattern = card.en.replace(
                                /<[^>]*>?/gm,
                                "",
                            );
                            const prompt = `OPIc English pattern: "${cleanPattern}". Provide 3 variations: 1. Casual (friends). 2. Formal. 3. Native idiomatic. JSON format: {"casual": "...", "formal": "...", "idiomatic": "..."}`;
                            const res = await callGemini(prompt, true);
                            setAiResult({
                                type: "paraphrase",
                                data: JSON.parse(res),
                            });
                        } catch (err) {
                            console.error(err);
                        } finally {
                            setIsAiLoading(false);
                        }
                    }

                    async function handleGetTips(e) {
                        if (e) e.stopPropagation();
                        setIsAiLoading(true);
                        setAiResult(null);
                        try {
                            const cleanPattern = card.en.replace(
                                /<[^>]*>?/gm,
                                "",
                            );
                            const prompt = `OPIc pattern "${cleanPattern}". 고득점 AL을 위한 꿀팁 3가지를 한국어로 요약해줘. JSON: {"tips": ["...", "...", "..."]}`;
                            const res = await callGemini(prompt, true);
                            setAiResult({
                                type: "tips",
                                data: JSON.parse(res),
                            });
                        } catch (err) {
                            console.error(err);
                        } finally {
                            setIsAiLoading(false);
                        }
                    }

                    async function handleTTS(e, text) {
                        if (e) e.stopPropagation();
                        if (isSpeaking) return;
                        setIsSpeaking(true);
                        try {
                            const res = await fetch(
                                `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`,
                                {
                                    method: "POST",
                                    headers: {
                                        "Content-Type": "application/json",
                                    },
                                    body: JSON.stringify({
                                        contents: [
                                            {
                                                parts: [
                                                    {
                                                        text: `Read naturally: ${text}`,
                                                    },
                                                ],
                                            },
                                        ],
                                        generationConfig: {
                                            responseModalities: ["AUDIO"],
                                            speechConfig: {
                                                voiceConfig: {
                                                    prebuiltVoiceConfig: {
                                                        voiceName: "Kore",
                                                    },
                                                },
                                            },
                                        },
                                    }),
                                },
                            );
                            const data = await res.json();
                            const pcmBase64 =
                                data.candidates[0].content.parts[0].inlineData
                                    .data;
                            const sampleRate = parseInt(
                                data.candidates[0].content.parts[0].inlineData.mimeType.match(
                                    /rate=(\d+)/,
                                )[1],
                            );
                            const bin = window.atob(pcmBase64);
                            const bytes = new Uint8Array(bin.length);
                            for (let i = 0; i < bin.length; i++)
                                bytes[i] = bin.charCodeAt(i);
                            const wav = pcmToWav(
                                new Int16Array(bytes.buffer),
                                sampleRate,
                            );
                            const audio = new Audio(
                                URL.createObjectURL(
                                    new Blob([wav], { type: "audio/wav" }),
                                ),
                            );
                            audio.play();
                            audio.onended = () => setIsSpeaking(false);
                        } catch (err) {
                            console.error(err);
                            setIsSpeaking(false);
                        }
                    }

                    return (
                        <div className="min-h-screen bg-slate-50 text-slate-900 p-4 pb-28 md:p-8 font-sans">

                                                                    {revealed.has(
                                                                        i,

                                                                        ? "숨기기"

                                                                {item.ko}

                                                                i,
                                                            ) && (

                                                                        →{" "}

                                                                        }
                                                                    </p>
                                                                </div>
                                                            )}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    ) : (

                                            </div>

                                )}

                                {/* Navigation */}
                                <div className="fixed bottom-8 left-0 right-0 px-6 z-50">
                                    <div className="max-w-md mx-auto flex gap-4">
                                        <button
                                            onClick={() => move(-1)}
                                            disabled={
                                                index === 0 ||
                                                currentList.length === 0
                                            }
                                            className="flex-1 py-5 rounded-[2rem] shadow-2xl font-black transition-all flex items-center justify-center gap-2 active:scale-90 bg-white text-slate-800 border border-slate-200 disabled:bg-slate-100 disabled:text-slate-300"
                                        >
                                            <ChevronLeftIcon />
                                        </button>
                                        <button
                                            onClick={() => move(1)}
                                            disabled={
                                                index ===
                                                    currentList.length - 1 ||
                                                currentList.length === 0
                                            }
                                            className="flex-[2] py-5 rounded-[2rem] shadow-2xl font-black transition-all flex items-center justify-center gap-3 active:scale-90 bg-emerald-600 text-white disabled:bg-slate-200"
                                        >
                                            다음 <ChevronRightIcon />
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    );
                }

                const root = ReactDOM.createRoot(
                    document.getElementById("root"),
                );
                root.render(<App />);
            })();
        </script>
    </body>
</html>
