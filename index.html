<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>OPIc 72 Patterns - JOON</title>
        <style>
            :root {
                --primary: #2ecc71;
                --dark: #1a1a1a;
                --bg: #f0f4f0;
            }
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                -webkit-tap-highlight-color: transparent;
            }
            body {
                font-family: "Segoe UI", sans-serif;
                background: var(--bg);
                color: #111;
                line-height: 1.5;
            }
            .header {
                background: #111;
                color: white;
                padding: 15px 20px;
                position: sticky;
                top: 0;
                z-index: 100;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .day-nav {
                background: white;
                display: flex;
                gap: 8px;
                overflow-x: auto;
                padding: 10px;
                border-bottom: 1px solid #ddd;
                scrollbar-width: none;
            }
            .day-nav::-webkit-scrollbar {
                display: none;
            }
            .day-btn {
                flex-shrink: 0;
                padding: 8px 15px;
                border-radius: 20px;
                border: 1px solid #ddd;
                background: white;
                font-size: 0.8rem;
                font-weight: bold;
                cursor: pointer;
            }
            .day-btn.active {
                background: var(--primary);
                color: white;
                border-color: var(--primary);
            }
            .review-btn {
                color: #e74c3c;
                border-color: #fab1a0;
            }
            .review-btn.active {
                background: #e74c3c;
                color: white;
            }
            .main {
                max-width: 600px;
                margin: 0 auto;
                padding: 20px 15px 120px;
            }
            .progress-container {
                margin-bottom: 15px;
                text-align: center;
            }
            .progress-bar {
                background: #ddd;
                height: 6px;
                border-radius: 3px;
                overflow: hidden;
            }
            .progress-fill {
                background: var(--primary);
                height: 100%;
                width: 0%;
                transition: width 0.3s;
            }
            .card-wrapper {
                perspective: 1000px;
                height: 460px;
                position: relative;
                cursor: pointer;
            }
            .card-inner {
                width: 100%;
                height: 100%;
                transition: transform 0.6s;
                transform-style: preserve-3d;
            }
            .card-wrapper.flipped .card-inner {
                transform: rotateY(180deg);
            }
            .card-face {
                position: absolute;
                width: 100%;
                height: 100%;
                backface-visibility: hidden;
                border-radius: 20px;
                padding: 25px;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
                display: flex;
                flex-direction: column;
            }
            .card-front {
                background: white;
                align-items: center;
                justify-content: center;
                text-align: center;
            }
            .card-back {
                background: var(--dark);
                color: white;
                transform: rotateY(180deg);
                overflow-y: auto;
            }
            .pattern-num {
                font-size: 3rem;
                font-weight: 900;
                color: #e8f5e9;
            }
            .pattern-en {
                font-size: 1.3rem;
                font-weight: bold;
                margin: 20px 0;
            }
            .pattern-en em {
                color: var(--primary);
                font-style: normal;
                text-decoration: underline;
            }
            .back-en {
                color: var(--primary);
                font-size: 1.1rem;
                font-weight: bold;
                margin-bottom: 5px;
            }
            .back-ko {
                font-size: 1rem;
                color: #ccc;
                margin-bottom: 20px;
                border-bottom: 1px solid #333;
                padding-bottom: 10px;
            }
            .example-box {
                background: #2d3436;
                padding: 12px;
                border-radius: 10px;
                margin-bottom: 10px;
            }
            .ex-ko {
                font-size: 0.85rem;
                color: #999;
                margin-bottom: 5px;
            }
            .ex-en {
                font-size: 0.9rem;
                color: #fff;
                font-weight: bold;
                display: none;
            }
            .ex-en.show {
                display: block;
            }
            .show-btn {
                background: #444;
                color: #eee;
                border: none;
                padding: 5px 10px;
                border-radius: 5px;
                font-size: 0.7rem;
                cursor: pointer;
            }
            .bookmark-btn {
                position: absolute;
                top: 20px;
                right: 20px;
                background: none;
                border: none;
                font-size: 1.8rem;
                color: #555;
                z-index: 10;
                cursor: pointer;
            }
            .bookmark-btn.on {
                color: #f1c40f;
            }
            .controls {
                position: fixed;
                bottom: 20px;
                left: 0;
                width: 100%;
                display: flex;
                justify-content: center;
                gap: 15px;
                padding: 0 15px;
            }
            .nav-btn {
                flex: 1;
                max-width: 250px;
                padding: 15px;
                border-radius: 15px;
                border: none;
                font-weight: bold;
                font-size: 1rem;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            }
            .btn-prev {
                background: white;
                color: #333;
            }
            .btn-next {
                background: var(--primary);
                color: white;
            }
        </style>
    </head>
    <body>
        <div class="header">
            <div style="font-weight: 900">
                OPIc 72 <span style="color: var(--primary)">JOON</span>
            </div>
        </div>
        <div class="day-nav" id="dayNav"></div>
        <div class="main">
            <div class="progress-container">
                <div id="dayTitle" style="font-weight: bold; font-size: 1.1rem">
                    DAY 1: 자유시간
                </div>
                <div class="progress-bar" style="margin: 10px 0">
                    <div class="progress-fill" id="bar"></div>
                </div>
                <div id="counter" style="font-size: 0.8rem; color: #777">
                    1 / 7
                </div>
            </div>
            <div
                class="card-wrapper"
                id="card"
                onclick="this.classList.toggle('flipped')"
            >
                <div class="card-inner">
                    <div class="card-face card-front">
                        <div class="pattern-num" id="pNum">01</div>
                        <div class="pattern-en" id="pEn"></div>
                        <div
                            style="
                                color: #bbb;
                                font-size: 0.8rem;
                                margin-top: auto;
                            "
                        >
                            탭하여 정답 확인
                        </div>
                    </div>
                    <div class="card-face card-back">
                        <button
                            class="bookmark-btn"
                            id="mark"
                            onclick="event.stopPropagation(); toggleMark();"
                        >
                            ★
                        </button>
                        <div class="back-en" id="bEn"></div>
                        <div class="back-ko" id="bKo"></div>
                        <div id="exList"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="controls">
            <button class="nav-btn btn-prev" onclick="move(-1)">이전</button>
            <button class="nav-btn btn-next" onclick="move(1)">다음</button>
        </div>

        <script>
            const DATA = [];
            // 1~9일차(7개), 10일차(9개) 로직 생성
            for (let i = 1; i <= 72; i++) {
                let d = Math.min(Math.ceil(i / 7), 10);
                DATA.push({
                    id: i,
                    day: d,
                    en: `Pattern ${i} Sentence with <em>Key Phrase</em>`,
                    ko: `패턴 ${i}의 한국어 의미입니다.`,
                    ex: [
                        {
                            ko: "예문 1번 질문/상황",
                            en: "Example answer 1 for pattern " + i,
                        },
                        {
                            ko: "예문 2번 질문/상황",
                            en: "Example answer 2 for pattern " + i,
                        },
                        {
                            ko: "예문 3번 질문/상황",
                            en: "Example answer 3 for pattern " + i,
                        },
                    ],
                });
            }

            // 실제 데이터 매핑 (첫/끝 예시)
            DATA[0].en = "I really enjoy <em>___</em> in my free time.";
            DATA[0].ko = "자유 시간에 ___ 하는 걸 정말 좋아해요.";
            DATA[71].en = "That was very helpful for <em>___</em>.";
            DATA[71].ko = "___ 에 정말 많은 도움이 됐습니다.";

            const TITLES = [
                "자유시간",
                "장점/감정",
                "돌발/비교",
                "사회이슈",
                "단점/변화",
                "미래전망",
                "롤플레이",
                "예약문의",
                "추천요청",
                "마무리",
            ];

            let state = JSON.parse(localStorage.getItem("JOON_OPIC")) || {
                d: 1,
                i: 0,
                m: [],
            };

            function render() {
                const list =
                    state.d === "rev"
                        ? DATA.filter((v) => state.m.includes(v.id))
                        : DATA.filter((v) => v.day === state.d);
                if (!list[state.i]) {
                    state.i = 0;
                    if (list.length === 0) state.d = 1;
                    return render();
                }

                const p = list[state.i];
                document.getElementById("pNum").innerText = String(
                    p.id,
                ).padStart(2, "0");
                document.getElementById("pEn").innerHTML = p.en;
                document.getElementById("bEn").innerHTML = p.en;
                document.getElementById("bKo").innerText = p.ko;
                document
                    .getElementById("mark")
                    .classList.toggle("on", state.m.includes(p.id));
                document.getElementById("dayTitle").innerText =
                    state.d === "rev"
                        ? "★ 오답 노트"
                        : `DAY ${state.d}: ${TITLES[state.d - 1]}`;

                document.getElementById("exList").innerHTML = p.ex
                    .map(
                        (e, idx) => `
        <div class="example-box">
            <div class="ex-ko">${idx + 1}. ${e.ko}</div>
            <div class="ex-en" id="e-${idx}">${e.en}</div>
            <button class="show-btn" onclick="event.stopPropagation(); document.getElementById('e-${idx}').classList.add('show'); this.style.display='none';">영작 확인</button>
        </div>
    `,
                    )
                    .join("");

                const prog = ((state.i + 1) / list.length) * 100;
                document.getElementById("bar").style.width = prog + "%";
                document.getElementById("counter").innerText =
                    `${state.i + 1} / ${list.length}`;

                localStorage.setItem("JOON_OPIC", JSON.stringify(state));
                buildNav();
            }

            function buildNav() {
                const nav = document.getElementById("dayNav");
                nav.innerHTML = "";
                for (let i = 1; i <= 10; i++) {
                    const b = document.createElement("button");
                    b.className = `day-btn ${state.d === i ? "active" : ""}`;
                    b.innerText = `D-${i}`;
                    b.onclick = () => {
                        state.d = i;
                        state.i = 0;
                        render();
                    };
                    nav.appendChild(b);
                }
                const rb = document.createElement("button");
                rb.className = `day-btn review-btn ${state.d === "rev" ? "active" : ""}`;
                rb.innerText = `★ (${state.m.length})`;
                rb.onclick = () => {
                    if (state.m.length) {
                        state.d = "rev";
                        state.i = 0;
                        render();
                    } else alert("북마크가 없습니다.");
                };
                nav.appendChild(rb);
            }

            function move(n) {
                const list =
                    state.d === "rev"
                        ? DATA.filter((v) => state.m.includes(v.id))
                        : DATA.filter((v) => v.day === state.d);
                const newIdx = state.i + n;
                if (newIdx >= 0 && newIdx < list.length) {
                    state.i = newIdx;
                    document.getElementById("card").classList.remove("flipped");
                    setTimeout(render, 150);
                }
            }

            function toggleMark() {
                const list =
                    state.d === "rev"
                        ? DATA.filter((v) => state.m.includes(v.id))
                        : DATA.filter((v) => v.day === state.d);
                const id = list[state.i].id;
                if (state.m.includes(id))
                    state.m = state.m.filter((v) => v !== id);
                else state.m.push(id);
                render();
            }

            render();
        </script>
    </body>
</html>
